# Render blueprint — single service hosting BOTH the API and the React client.
# The Express server serves client/dist in production (SERVE_CLIENT=true), so the
# whole app lives at one URL with no CORS/cross-origin setup.
# Create via Render → New → Blueprint, pointing at this repo.
services:
  - type: web
    name: cybernexus-x
    runtime: node
    plan: free
    # --include=dev forces devDependencies (typescript, vite, tsc) to install even
    # though NODE_ENV=production, which npm would otherwise skip → build tools missing.
    buildCommand: npm install --include=dev && npm run build:shared && npm run build -w client && npm run build -w server
    startCommand: node server/dist/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_CLIENT
        value: 'true' # Express serves the built React client
      - key: JWT_SECRET
        generateValue: true # Render generates a strong secret
      - key: MONGODB_URI
        sync: false # paste your MongoDB Atlas connection string
      # AI Threat Analyst (optional). Leave blank to run without it — the endpoint
      # reports available:false instead of fabricating.
      - key: ANTHROPIC_API_KEY
        sync: false # paste your Anthropic key, or leave blank
      - key: AI_MODEL
        value: claude-sonnet-5
      # Threat Intelligence lookups (optional). Leave blank to run without them —
      # the endpoint reports available:false per-provider instead of fabricating.
      - key: ABUSEIPDB_API_KEY
        sync: false # paste your AbuseIPDB key, or leave blank
      - key: VIRUSTOTAL_API_KEY
        sync: false # paste your VirusTotal key, or leave blank
      # Other optional integrations (leave unset to run without them):
      # - key: SMTP_HOST  (+ SMTP_PORT / SMTP_USER / SMTP_PASS / ALERT_FROM / ALERT_TO)
